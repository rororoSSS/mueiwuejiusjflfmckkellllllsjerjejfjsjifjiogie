<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>stick family</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            text-align: center;
            background-color: #000000;
            color: #00ffcc;
            margin: 0; padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .setup-ui {
            position: absolute;
            z-index: 10;
            background: rgba(0,0,0,0.85);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #00ffcc;
        }
        input, button {
            background: #111;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 8px 15px;
            font-size: 1rem;
            border-radius: 5px;
            margin: 5px;
            cursor: pointer;
        }
        button:active { background: #00ffcc; color: #000; }
        
        .video-container {
            position: relative;
            width: 90vw;
            max-width: 640px;
            aspect-ratio: 3 / 4; 
            border-radius: 20px;
            overflow: hidden;
            background-color: #000000;
            box-shadow: 0 0 40px rgba(0, 255, 170, 0.2);
        }
        #webcam { display: none; }
        #output_canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
        }
        #countdown {
            position: absolute;
            z-index: 5;
            font-size: 5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px #ff0055;
            display: none;
        }
        #stage-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000;
            z-index: 8;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #loading {
            position: absolute;
            z-index: 3;
            color: #00ffcc;
            font-weight: bold;
            background: rgba(0,0,0,0.85);
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid #00ffcc;
        }
        #color-toast {
            position: absolute;
            top: 20px;
            z-index: 4;
            font-size: 1.2rem;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 20px;
            display: none;
        }

        /* 📸 新增：下載圖片彈出遮罩層樣式 */
        #download-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            z-index: 999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #download-img {
            max-width: 85vw;
            max-height: 70vh;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <p id="loading">loading...</p>
    <div id="color-toast">current color</div>

    <div id="download-overlay">
        <p style="color: #00ffcc; font-weight: bold; margin-bottom: 10px;">save photo</p>
        <img id="download-img" src="" alt="大合照">
        <br>
        <button onclick="document.getElementById('download-overlay').style.display='none'" style="border-color: #ff0055; color: #ff0055;">close window, keep editting</button>
    </div>

    <div id="setup-panel" class="setup-ui">
        <h3>stick family</h3>
        <label>how many？ </label>
        <input type="number" id="photo-count" value="3" min="1" max="10" style="width: 50px; text-align:center;">
        <br><br>
        <button onclick="startCaptureFlow()">start</button>
    </div>

    <div id="countdown">3</div>

    <div id="container" class="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div id="stage-container">
        <div style="position:absolute; top:10px; z-index:9; width:100%; text-align:center;">
            <p style="margin:5px 0; color:#fff;">layout and save</p>
            <button onclick="downloadPoster()" style="border-color:#ff0055; color:#ff0055; font-weight:bold; box-shadow: 0 0 10px rgba(255,0,85,0.5);">generate photo</button>
            <button onclick="location.reload()">start again</button>
        </div>
        <canvas id="edit_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const containerElement = document.getElementById('container');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');
        const countdownEl = document.getElementById('countdown');
        const colorToast = document.getElementById('color-toast');

        let latestFaceResults = null;
        let latestHandResults = null;
        let latestPoseResults = null;

        let totalPhotos = 3;
        let currentPhotoIndex = 0;
        let savedImages = []; 
        let fabricCanvas = null; 

        const NEON_COLORS = [
            { name: "green", facePose: "#00ffcc", handLine: "#ffffff", handGlow: "#ff0055" },
            { name: "pink", facePose: "#ff0055", handLine: "#ffffff", handGlow: "#00ffcc" },
            { name: "yellow", facePose: "#ffff00", handLine: "#ffffff", handGlow: "#ff00ff" },
            { name: "blue", facePose: "#0077ff", handLine: "#ffffff", handGlow: "#ffff00" },
            { name: "purple", facePose: "#b300ff", handLine: "#ffffff", handGlow: "#00ffcc" }
        ];

        // 初始化 MediaPipe
        const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
        faceMesh.setOptions({ maxNumFaces: 4, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        faceMesh.onResults(results => { latestFaceResults = results; if(loadingText) loadingText.style.display='none'; });

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 8, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(results => latestHandResults = results);

        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults(results => latestPoseResults = results);

        function getDistance(p1, p2) { return Math.hypot(p1.x - p2.x, p1.y - p2.y); }

        function drawScene() {
            if (canvasElement.width !== videoElement.videoWidth && videoElement.videoWidth > 0) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                containerElement.style.aspectRatio = `${videoElement.videoWidth} / ${videoElement.videoHeight}`;
            }

            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.save();
            canvasCtx.translate(canvasElement.width, 0);
            canvasCtx.scale(-1, 1);

            canvasCtx.shadowBlur = 15;
            const w = canvasElement.width;
            const h = canvasElement.height;

            const colorTheme = NEON_COLORS[currentPhotoIndex % NEON_COLORS.length];

// ─── 繪製身體（全身解鎖版） ───
            if (latestPoseResults && latestPoseResults.poseLandmarks) {
                const poseLandmarks = latestPoseResults.poseLandmarks;
                canvasCtx.shadowColor = colorTheme.facePose; 
                canvasCtx.strokeStyle = colorTheme.facePose; 
                canvasCtx.lineWidth = 5;
                
                // 上半身點位
                const pt11 = poseLandmarks[11], pt12 = poseLandmarks[12]; // 肩
                const pt13 = poseLandmarks[13], pt14 = poseLandmarks[14]; // 肘
                const pt15 = poseLandmarks[15], pt16 = poseLandmarks[16]; // 腕
                
                // 下半身新增點位
                const pt23 = poseLandmarks[23], pt24 = poseLandmarks[24]; // 髖部（臀部）
                const pt25 = poseLandmarks[25], pt26 = poseLandmarks[26]; // 膝蓋
                const pt27 = poseLandmarks[27], pt28 = poseLandmarks[28]; // 腳踝

                // 1. 畫肩膀
                if (poseLandmarks[11]?.visibility > 0.5 && poseLandmarks[12]?.visibility > 0.5) {
                    canvasCtx.beginPath(); canvasCtx.moveTo(pt11.x * w, pt11.y * h); canvasCtx.lineTo(pt12.x * w, pt12.y * h); canvasCtx.stroke();
                }
                // 2. 畫左手臂
                if (poseLandmarks[13]?.visibility > 0.5) {
                    canvasCtx.beginPath(); canvasCtx.moveTo(pt11.x * w, pt11.y * h); canvasCtx.lineTo(pt13.x * w, pt13.y * h); canvasCtx.lineTo(pt15.x * w, pt15.y * h); canvasCtx.stroke();
                }
                // 3. 畫右手臂
                if (poseLandmarks[14]?.visibility > 0.5) {
                    canvasCtx.beginPath(); canvasCtx.moveTo(pt12.x * w, pt12.y * h); canvasCtx.lineTo(pt14.x * w, pt14.y * h); canvasCtx.lineTo(pt16.x * w, pt16.y * h); canvasCtx.stroke();
                }
                // 4. 畫軀幹（肩膀連到臀部）
                if (poseLandmarks[23]?.visibility > 0.5 && poseLandmarks[24]?.visibility > 0.5) {
                    canvasCtx.beginPath(); 
                    canvasCtx.moveTo(pt11.x * w, pt11.y * h); canvasCtx.lineTo(pt23.x * w, pt23.y * h); // 左肩到左髖
                    canvasCtx.moveTo(pt12.x * w, pt12.y * h); canvasCtx.lineTo(pt24.x * w, pt24.y * h); // 右肩到右髖
                    canvasCtx.lineTo(pt23.x * w, pt23.y * h); // 左右髖相連
                    canvasCtx.stroke();
                }
                // 5. 畫左腳（髖 -> 膝 -> 腳踝）
                if (poseLandmarks[25]?.visibility > 0.5) {
                    canvasCtx.beginPath(); canvasCtx.moveTo(pt23.x * w, pt23.y * h); canvasCtx.lineTo(pt25.x * w, pt25.y * h); canvasCtx.lineTo(pt27.x * w, pt27.y * h); canvasCtx.stroke();
                }
                // 6. 畫右腳（髖 -> 膝 -> 腳踝）
                if (poseLandmarks[26]?.visibility > 0.5) {
                    canvasCtx.beginPath(); canvasCtx.moveTo(pt24.x * w, pt24.y * h); canvasCtx.lineTo(pt26.x * w, pt26.y * h); canvasCtx.lineTo(pt28.x * w, pt28.y * h); canvasCtx.stroke();
                }
            }

            if (latestPoseResults && latestPoseResults.poseLandmarks) {
                const poseLandmarks = latestPoseResults.poseLandmarks;
                canvasCtx.shadowColor = colorTheme.facePose; canvasCtx.strokeStyle = colorTheme.facePose; canvasCtx.lineWidth = 5;
                const pt11 = poseLandmarks[11], pt12 = poseLandmarks[12], pt13 = poseLandmarks[13], pt14 = poseLandmarks[14], pt15 = poseLandmarks[15], pt16 = poseLandmarks[16];
                
                if (poseLandmarks[11]?.visibility > 0.5 && poseLandmarks[12]?.visibility > 0.5) {
                    canvasCtx.beginPath(); canvasCtx.moveTo(pt11.x * w, pt11.y * h); canvasCtx.lineTo(pt12.x * w, pt12.y * h); canvasCtx.stroke();
                }
                if (poseLandmarks[13]?.visibility > 0.5) {
                    canvasCtx.beginPath(); canvasCtx.moveTo(pt11.x * w, pt11.y * h); canvasCtx.lineTo(pt13.x * w, pt13.y * h); canvasCtx.lineTo(pt15.x * w, pt15.y * h); canvasCtx.stroke();
                }
                if (poseLandmarks[14]?.visibility > 0.5) {
                    canvasCtx.beginPath(); canvasCtx.moveTo(pt12.x * w, pt12.y * h); canvasCtx.lineTo(pt14.x * w, pt14.y * h); canvasCtx.lineTo(pt16.x * w, pt16.y * h); canvasCtx.stroke();
                }
            }

            if (latestHandResults && latestHandResults.multiHandLandmarks) {
                canvasCtx.shadowColor = colorTheme.handGlow; canvasCtx.strokeStyle = colorTheme.handLine; canvasCtx.lineWidth = 3;
                const connections = window.HAND_CONNECTIONS || (typeof HAND_CONNECTIONS !== 'undefined' ? HAND_CONNECTIONS : null);
                if (connections) {
                    for (const landmarks of latestHandResults.multiHandLandmarks) {
                        for (const connection of connections) {
                            const firstPt = landmarks[connection[0]], secondPt = landmarks[connection[1]];
                            if (firstPt && secondPt) {
                                canvasCtx.beginPath(); canvasCtx.moveTo(firstPt.x * w, firstPt.y * h); canvasCtx.lineTo(secondPt.x * w, secondPt.y * h); canvasCtx.stroke();
                            }
                        }
                    }
                }
            }

            canvasCtx.restore();
            requestAnimationFrame(drawScene);
        }

        function startCaptureFlow() {
            totalPhotos = parseInt(document.getElementById('photo-count').value) || 3;
            currentPhotoIndex = 0;
            savedImages = [];
            document.getElementById('setup-panel').style.display = 'none';
            triggerCountdown();
        }

        function triggerCountdown() {
            if (currentPhotoIndex >= totalPhotos) {
                colorToast.style.display = 'none';
                enterEditStage();
                return;
            }

            const theme = NEON_COLORS[currentPhotoIndex % NEON_COLORS.length];
            colorToast.innerText = `${currentPhotoIndex + 1} color：${theme.name}`;
            colorToast.style.borderColor = theme.facePose;
            colorToast.style.color = theme.facePose;
            colorToast.style.display = 'block';

            let count = 3;
            countdownEl.innerText = count;
            countdownEl.style.display = 'block';

            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownEl.innerText = count;
                } else {
                    clearInterval(timer);
                    countdownEl.style.display = 'none';
                    takeSnapshot();
                    currentPhotoIndex++;
                    setTimeout(triggerCountdown, 1200);
                }
            }, 1000);
        }

        function takeSnapshot() {
            const dataUrl = canvasElement.toDataURL("image/png");
            savedImages.push(dataUrl);
            
            const flash = document.createElement('div');
            flash.style = "position:absolute; top:0; left:0; width:100vw; height:100vh; background:#fff; z-index:99; opacity:1; transition:opacity 0.4s;";
            document.body.appendChild(flash);
            setTimeout(() => { flash.style.opacity = 0; setTimeout(() => flash.remove(), 400); }, 50);
        }

        function enterEditStage() {
            containerElement.style.display = 'none';
            document.getElementById('stage-container').style.display = 'flex';

            const editCanvasElement = document.getElementById('edit_canvas');
            editCanvasElement.width = window.innerWidth;
            editCanvasElement.height = window.innerHeight;

            fabricCanvas = new fabric.Canvas('edit_canvas', {
                backgroundColor: '#000000',
                width: window.innerWidth,
                height: window.innerHeight
            });

            savedImages.forEach((imgSrc, index) => {
                fabric.Image.fromURL(imgSrc, function(oImg) {
                    oImg.scale(0.75);
                    oImg.set({
                        left: 80 + (index * 70),
                        top: 150 + (index * 40),
                        cornerColor: '#00ffcc',
                        cornerStrokeColor: '#00ffcc',
                        borderColor: '#ff0055',
                        cornerSize: 12,
                        transparentCorners: false
                    });
                    fabricCanvas.add(oImg);
                });
            });
        }

        // 🎯 【關鍵修改】不再使用隱藏下載，改用長按圖片視窗
        function downloadPoster() {
            if (!fabricCanvas) return;
            
            // 先隱藏正在編輯的選取框線
            fabricCanvas.discardActiveObject();
            fabricCanvas.requestRenderAll();

            setTimeout(() => {
                // 將畫布轉成高畫質 PNG Base64 數據
                const dataURL = fabricCanvas.toDataURL({
                    format: 'png',
                    quality: 1.0
                });

                // 把數據塞進彈出視窗的 <img> 標籤內
                const downloadImg = document.getElementById('download-img');
                downloadImg.src = dataURL;

                // 顯示彈出遮罩層，讓使用者能安全長按儲存
                document.getElementById('download-overlay').style.display = 'flex';
            }, 100);
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                videoElement.srcObject = stream;
                videoElement.addEventListener('loadedmetadata', () => {
                    drawScene();
                    tickAI();
                });
            } catch (err) { alert("cannot open camera"); }
        }

        async function tickAI() {
            if (videoElement.readyState >= 2) {
                await faceMesh.send({ image: videoElement });
                await hands.send({ image: videoElement });
                await pose.send({ image: videoElement });
            }
            requestAnimationFrame(tickAI);
        }

        window.addEventListener('DOMContentLoaded', startCamera);
    </script>
</body>
</html>
