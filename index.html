<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>stick family</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            text-align: center;
            background-color: #000000;
            color: #00ffcc;
            margin: 0; padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .setup-ui {
            position: absolute;
            z-index: 10;
            background: rgba(0,0,0,0.85);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #00ffcc;
        }
        input, button {
            background: #111;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 8px 15px;
            font-size: 1rem;
            border-radius: 5px;
            margin: 5px;
            cursor: pointer;
        }
        button:active { background: #00ffcc; color: #000; }
        
        .video-container {
            position: relative;
            width: 90vw;
            max-width: 640px;
            aspect-ratio: 3 / 4; 
            border-radius: 20px;
            overflow: hidden;
            background-color: #000000;
            box-shadow: 0 0 40px rgba(0, 255, 170, 0.2);
        }
        #webcam { display: none; }
        #output_canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
        }
        #countdown {
            position: absolute;
            z-index: 5;
            font-size: 5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px #ff0055;
            display: none;
        }
        #stage-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000;
            z-index: 8;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #loading {
            position: absolute;
            z-index: 3;
            color: #00ffcc;
            font-weight: bold;
            background: rgba(0,0,0,0.85);
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid #00ffcc;
        }
        /* 當前拍攝顏色提示 */
        #color-toast {
            position: absolute;
            top: 20px;
            z-index: 4;
            font-size: 1.2rem;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <p id="loading">loading...</p>
    <div id="color-toast">當前線條顏色</div>

    <div id="setup-panel" class="setup-ui">
        <h3>stick family</h3>
        <label>how many photos？ </label>
        <input type="number" id="photo-count" value="3" min="1" max="10" style="width: 50px; text-align:center;">
        <br><br>
        <button onclick="startCaptureFlow()">start！</button>
    </div>

    <div id="countdown">3</div>

    <div id="container" class="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div id="stage-container">
        <div style="position:absolute; top:10px; z-index:9; width:100%; text-align:center;">
            <p style="margin:5px 0; color:#fff;">layout and download</p>
            <button onclick="downloadPoster()" style="border-color:#ff0055; color:#ff0055; font-weight:bold; box-shadow: 0 0 10px rgba(255,0,85,0.5);">💾 下載大合照 (PNG)</button>
            <button onclick="location.reload()">start again</button>
        </div>
        <canvas id="edit_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const containerElement = document.getElementById('container');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');
        const countdownEl = document.getElementById('countdown');
        const colorToast = document.getElementById('color-toast');

        let latestFaceResults = null;
        let latestHandResults = null;
        let latestPoseResults = null;

        let totalPhotos = 3;
        let currentPhotoIndex = 0;
        let savedImages = []; 
        let fabricCanvas = null; // Fabric 畫布實例

        // 🌈 預設的霓虹經典五彩色票清單 (可以自己增減或改色碼)
        const NEON_COLORS = [
            { name: "霓虹綠", facePose: "#00ffcc", handLine: "#ffffff", handGlow: "#ff0055" },
            { name: "魔幻粉", facePose: "#ff0055", handLine: "#ffffff", handGlow: "#00ffcc" },
            { name: "閃耀黃", facePose: "#ffff00", handLine: "#ffffff", handGlow: "#ff00ff" },
            { name: "電光藍", facePose: "#0077ff", handLine: "#ffffff", handGlow: "#ffff00" },
            { name: "魅惑紫", facePose: "#b300ff", handLine: "#ffffff", handGlow: "#00ffcc" }
        ];

        // 初始化 MediaPipe
        const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
        faceMesh.setOptions({ maxNumFaces: 4, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        faceMesh.onResults(results => { latestFaceResults = results; if(loadingText) loadingText.style.display='none'; });

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 8, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(results => latestHandResults = results);

        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults(results => latestPoseResults = results);

        function getDistance(p1, p2) { return Math.hypot(p1.x - p2.x, p1.y - p2.y); }

        // 繪圖迴圈
        function drawScene() {
            if (canvasElement.width !== videoElement.videoWidth && videoElement.videoWidth > 0) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                containerElement.style.aspectRatio = `${videoElement.videoWidth} / ${videoElement.videoHeight}`;
            }

            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.save();
            canvasCtx.translate(canvasElement.width, 0);
            canvasCtx.scale(-1, 1);

            canvasCtx.shadowBlur = 15;
            const w = canvasElement.width;
            const h = canvasElement.height;

            // 🎯 【動態取色】根據當前拍到第幾張，自動決定要畫什麼顏色
            const colorTheme = NEON_COLORS[currentPhotoIndex % NEON_COLORS.length];

            // ─── 繪製臉部 ───
            if (latestFaceResults && latestFaceResults.multiFaceLandmarks) {
                canvasCtx.shadowColor = colorTheme.facePose; 
                canvasCtx.strokeStyle = colorTheme.facePose;
                canvasCtx.fillStyle = colorTheme.facePose; 
                canvasCtx.lineWidth = 4; canvasCtx.lineCap = 'round';

                for (const landmarks of latestFaceResults.multiFaceLandmarks) {
                    const leftOuter = landmarks[33], leftInner = landmarks[133], leftTop = landmarks[159], leftBottom = landmarks[145];
                    const rightOuter = landmarks[263], rightInner = landmarks[362], rightTop = landmarks[386], rightBottom = landmarks[374];

                    let eyeScaleLeft = 15; if (leftOuter && leftInner) eyeScaleLeft = getDistance(leftOuter, leftInner) * w * 0.5;
                    let eyeScaleRight = 15; if (rightOuter && rightInner) eyeScaleRight = getDistance(rightOuter, rightInner) * w * 0.5;

                    if (leftOuter && leftInner && leftTop && leftBottom) {
                        const centerX = (leftOuter.x + leftInner.x) / 2 * w;
                        const centerY = (leftOuter.y + leftInner.y) / 2 * h;
                        canvasCtx.beginPath();
                        if (getDistance(leftTop, leftBottom) > 0.015) { canvasCtx.arc(centerX, centerY, eyeScaleLeft, 0, 2 * Math.PI); canvasCtx.fill(); }
                        else { canvasCtx.moveTo(leftOuter.x * w, leftOuter.y * h); canvasCtx.lineTo(leftInner.x * w, leftInner.y * h); canvasCtx.stroke(); }
                    }
                    if (rightOuter && rightInner && rightTop && rightBottom) {
                        const centerX = (rightOuter.x + rightInner.x) / 2 * w;
                        const centerY = (rightOuter.y + rightInner.y) / 2 * h;
                        canvasCtx.beginPath();
                        if (getDistance(rightTop, rightBottom) > 0.015) { canvasCtx.arc(centerX, centerY, eyeScaleRight, 0, 2 * Math.PI); canvasCtx.fill(); }
                        else { canvasCtx.moveTo(rightOuter.x * w, rightOuter.y * h); canvasCtx.lineTo(rightInner.x * w, rightInner.y * h); canvasCtx.stroke(); }
                    }

                    const leftCorner = landmarks[61], rightCorner = landmarks[291];
                    if (leftCorner && rightCorner) {
                        const lx = leftCorner.x * w, ly = leftCorner.y * h, rx = rightCorner.x * w, ry = rightCorner.y * h;
                        const mouthCenterX = (lx + rx) / 2, mouthCenterY = (ly + ry) / 2;
                        const shortenFactor = 0.65;
                        const halfShortX = ((rx - lx) * shortenFactor) / 2, halfShortY = ((ry - ly) * shortenFactor) / 2;
                        const eyeCenterX = (landmarks[133].x + landmarks[362].x) / 2 * w, eyeCenterY = (landmarks[133].y + landmarks[362].y) / 2 * h;
                        const liftFactor = 0.45;
                        const finalCenterX = mouthCenterX + (eyeCenterX - mouthCenterX) * liftFactor;
                        const finalCenterY = mouthCenterY + (eyeCenterY - mouthCenterY) * liftFactor;

                        canvasCtx.beginPath();
                        canvasCtx.moveTo(finalCenterX - halfShortX, finalCenterY - halfShortY);
                        canvasCtx.lineTo(finalCenterX + halfShortX, finalCenterY + halfShortY);
                        canvasCtx.stroke();
                    }
                }
            }

            // ─── 繪製身體 ───
            if (latestPoseResults && latestPoseResults.poseLandmarks) {
                const poseLandmarks = latestPoseResults.poseLandmarks;
                canvasCtx.shadowColor = colorTheme.facePose; 
                canvasCtx.strokeStyle = colorTheme.facePose; 
                canvasCtx.lineWidth = 5;
                const pt11 = poseLandmarks[11], pt12 = poseLandmarks[12], pt13 = poseLandmarks[13], pt14 = poseLandmarks[14], pt15 = poseLandmarks[15], pt16 = poseLandmarks[16];
                
                if (poseLandmarks[11]?.visibility > 0.5 && poseLandmarks[12]?.visibility > 0.5) {
                    canvasCtx.beginPath(); canvasCtx.moveTo(pt11.x * w, pt11.y * h); canvasCtx.lineTo(pt12.x * w, pt12.y * h); canvasCtx.stroke();
                }
                if (poseLandmarks[13]?.visibility > 0.5) {
                    canvasCtx.beginPath(); canvasCtx.moveTo(pt11.x * w, pt11.y * h); canvasCtx.lineTo(pt13.x * w, pt13.y * h); canvasCtx.lineTo(pt15.x * w, pt15.y * h); canvasCtx.stroke();
                }
                if (poseLandmarks[14]?.visibility > 0.5) {
                    canvasCtx.beginPath(); canvasCtx.moveTo(pt12.x * w, pt12.y * h); canvasCtx.lineTo(pt14.x * w, pt14.y * h); canvasCtx.lineTo(pt16.x * w, pt16.y * h); canvasCtx.stroke();
                }
            }

            // ─── 繪製手部 ───
            if (latestHandResults && latestHandResults.multiHandLandmarks) {
                canvasCtx.shadowColor = colorTheme.handGlow; 
                canvasCtx.strokeStyle = colorTheme.handLine; 
                canvasCtx.lineWidth = 3;
                const connections = window.HAND_CONNECTIONS || (typeof HAND_CONNECTIONS !== 'undefined' ? HAND_CONNECTIONS : null);
                if (connections) {
                    for (const landmarks of latestHandResults.multiHandLandmarks) {
                        for (const connection of connections) {
                            const firstPt = landmarks[connection[0]], secondPt = landmarks[connection[1]];
                            if (firstPt && secondPt) {
                                canvasCtx.beginPath(); canvasCtx.moveTo(firstPt.x * w, firstPt.y * h); canvasCtx.lineTo(secondPt.x * w, secondPt.y * h); canvasCtx.stroke();
                            }
                        }
                    }
                }
            }

            canvasCtx.restore();
            requestAnimationFrame(drawScene);
        }

        // 📸 拍照流程
        function startCaptureFlow() {
            totalPhotos = parseInt(document.getElementById('photo-count').value) || 3;
            currentPhotoIndex = 0;
            savedImages = [];
            document.getElementById('setup-panel').style.display = 'none';
            triggerCountdown();
        }

        function triggerCountdown() {
            if (currentPhotoIndex >= totalPhotos) {
                colorToast.style.display = 'none';
                enterEditStage();
                return;
            }

            // 顯示當前這張照片分配到的霓虹顏色提示
            const theme = NEON_COLORS[currentPhotoIndex % NEON_COLORS.length];
            colorToast.innerText = `第 ${currentPhotoIndex + 1} 張顏色：${theme.name}`;
            colorToast.style.borderColor = theme.facePose;
            colorToast.style.color = theme.facePose;
            colorToast.style.display = 'block';

            let count = 3;
            countdownEl.innerText = count;
            countdownEl.style.display = 'block';

            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownEl.innerText = count;
                } else {
                    clearInterval(timer);
                    countdownEl.style.display = 'none';
                    takeSnapshot();
                    currentPhotoIndex++; // 切換到下一個顏色
                    setTimeout(triggerCountdown, 1200);
                }
            }, 1000);
        }

        function takeSnapshot() {
            const dataUrl = canvasElement.toDataURL("image/png");
            savedImages.push(dataUrl);
            
            // 閃光特效
            const flash = document.createElement('div');
            flash.style = "position:absolute; top:0; left:0; width:100vw; height:100vh; background:#fff; z-index:99; opacity:1; transition:opacity 0.4s;";
            document.body.appendChild(flash);
            setTimeout(() => { flash.style.opacity = 0; setTimeout(() => flash.remove(), 400); }, 50);
        }

        // 🎨 進入黑色拼貼編輯舞台
        function enterEditStage() {
            containerElement.style.display = 'none';
            document.getElementById('stage-container').style.display = 'flex';

            const editCanvasElement = document.getElementById('edit_canvas');
            editCanvasElement.width = window.innerWidth;
            editCanvasElement.height = window.innerHeight;

            // 初始化 Fabric 畫布
            fabricCanvas = new fabric.Canvas('edit_canvas', {
                backgroundColor: '#000000',
                width: window.innerWidth,
                height: window.innerHeight
            });

            // 疊加拍好的彩色火柴人
            savedImages.forEach((imgSrc, index) => {
                fabric.Image.fromURL(imgSrc, function(oImg) {
                    oImg.scale(0.75);
                    oImg.set({
                        left: 80 + (index * 70),
                        top: 150 + (index * 40),
                        cornerColor: '#00ffcc',
                        cornerStrokeColor: '#00ffcc',
                        borderColor: '#ff0055',
                        cornerSize: 12,
                        transparentCorners: false
                    });
                    fabricCanvas.add(oImg);
                });
            });
        }

        // 💾 【全新功能】將大家排版好的作品下載存檔
        function downloadPoster() {
            if (!fabricCanvas) return;
            
            // 為了確保下載時不會把控制圖片的外框和旋轉鈕也拍進去，下載前先清除選取狀態
            fabricCanvas.discardActiveObject();
            fabricCanvas.requestRenderAll();

            // 在渲染完成後執行下載
            setTimeout(() => {
                const dataURL = fabricCanvas.toDataURL({
                    format: 'png',
                    quality: 1.0
                });

                // 建立虛擬超連結觸發瀏覽器下載
                const link = document.createElement('a');
                link.download = `neon-stickman-${Date.now()}.png`; // 檔名包含時間戳記
                link.href = dataURL;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }, 100);
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                videoElement.srcObject = stream;
                videoElement.addEventListener('loadedmetadata', () => {
                    drawScene();
                    tickAI();
                });
            } catch (err) { alert("無法開啟相機，請確認權限！"); }
        }

        async function tickAI() {
            if (videoElement.readyState >= 2) {
                await faceMesh.send({ image: videoElement });
                await hands.send({ image: videoElement });
                await pose.send({ image: videoElement });
            }
            requestAnimationFrame(tickAI);
        }

        window.addEventListener('DOMContentLoaded', startCamera);
    </script>
</body>
</html>
